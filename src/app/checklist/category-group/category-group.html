<mat-card [attr.aria-label]="category() + ' checklist items'">
  <mat-card-header>
    <mat-card-title>{{ category() }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    @if (formArray().length === 0) {
      <p data-testid="empty-state">No items in this category.</p>
    }

    <mat-list
      cdkDropList
      [attr.aria-label]="category() + ' items list'"
      (cdkDropListDropped)="onDrop($event)"
    >
      @for (
        group of formArray().controls;
        track group.get('id')?.value;
        let i = $index;
        let first = $first;
        let last = $last
      ) {
        <mat-list-item data-testid="checklist-item" cdkDrag>
          <button
            mat-icon-button
            type="button"
            data-testid="move-up-btn"
            [attr.aria-label]="'Move ' + group.get('label')?.value + ' up'"
            [disabled]="first"
            (click)="moveUp(i)"
          >
            <mat-icon>arrow_upward</mat-icon>
          </button>
          <button
            mat-icon-button
            type="button"
            data-testid="move-down-btn"
            [attr.aria-label]="'Move ' + group.get('label')?.value + ' down'"
            [disabled]="last"
            (click)="moveDown(i)"
          >
            <mat-icon>arrow_downward</mat-icon>
          </button>
          <span>{{ group.get('label')?.value }}</span>
          <button
            mat-icon-button
            type="button"
            data-testid="delete-item-btn"
            [attr.aria-label]="'Delete ' + group.get('label')?.value"
            (click)="deleteItem(i)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </mat-list-item>
      }
    </mat-list>

    <div class="flex items-center gap-2 mt-2">
      <mat-form-field>
        <mat-label>New item for {{ category() }}</mat-label>
        <input
          matInput
          data-testid="add-item-input"
          [attr.aria-label]="'New item for ' + category()"
          [value]="newItemLabel()"
          (input)="onInputChange($event)"
          (keydown.enter)="addItem()"
        />
      </mat-form-field>
      <button
        mat-icon-button
        type="button"
        data-testid="add-item-btn"
        [attr.aria-label]="'Add item to ' + category()"
        (click)="addItem()"
      >
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </mat-card-content>
</mat-card>

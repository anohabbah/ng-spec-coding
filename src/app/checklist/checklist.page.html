<main aria-label="Checklist Template Management" class="flex flex-col gap-4">
  <h1 class="mb-6">Checklist Template</h1>

  @for (cat of categories; track cat) {
    <app-category-group [category]="cat" [formArray]="getFormArray(cat)" />
  }

  <div class="flex justify-end gap-4">
    <button
      mat-button
      type="button"
      data-testid="reset-btn"
      aria-label="Reset changes"
      (click)="reset()"
    >
      Reset
    </button>
    <button
      mat-raised-button
      type="button"
      data-testid="submit-btn"
      aria-label="Submit changes"
      (click)="submit()"
    >
      Submit
    </button>
  </div>
</main>
